name: Performance Report

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate performance report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_performance_report.py \
            --repo "${{ github.repository }}" \
            --students .github/performance-students.json \
            --output-dir docs/performance

      - name: Commit and push generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/performance/metrics.json docs/performance/index.html
          git diff --cached --quiet || git commit -m "chore: atualiza relatório de desempenho [skip ci]"
          git push
